<style>
body {
  background-color: #121212;
  color: #ffffff;
  font-family: sans-serif;
  padding: 20px;
}

#inputPencarian {
  width: 100%;
  max-width: 400px;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #444;
  background-color: #1e1e1e;
  color: #fff;
  outline: none;
}

#inputPencarian:focus {
  border-color: #646cff;
}

.search-content {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 400px;
}

.item-kotak {
  padding: 15px;
  border-radius: 8px;
  background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
  border: 1px solid #333;
  transition: opacity 0.2s ease-in-out;
}

.item-kotak h3 {
  margin: 0 0 5px 0;
  font-size: 18px;
}

.item-kotak p {
  margin: 0;
  font-size: 14px;
  color: #aaa;
}
</style>

<!-- Input pencarian -->
<input type="text" id="inputPencarian" placeholder="Cari nama atau divisi...">

<!-- Container pencarian -->
<div class="search-content">
  <!-- Kotak-kotak yang akan dicari -->
  <div class="item-kotak">
    <h3>Asep Sumantri</h3>
    <p>Divisi Multimedia</p>
  </div>
  
  <div class="item-kotak">
    <h3>Siti Aminah</h3>
    <p>Divisi Jurnalistik</p>
  </div>
  
  <div class="item-kotak">
    <h3>Budi Santoso</h3>
    <p>Divisi Humas</p>
  </div>
  
  <div class="item-kotak">
    <h3>Rina Melati</h3>
    <p>Divisi Multimedia</p>
  </div>
</div>

<script>
    // 1. Ambil elemen input dan semua kotak di dalam search-content
const inputSearch = document.getElementById('inputPencarian');
const items = document.querySelectorAll('.search-content .item-kotak');

// 2. Tambahkan event listener saat user mengetik
inputSearch.addEventListener('input', function(e) {
  // Ubah input menjadi huruf kecil agar pencarian tidak case-sensitive
  const keyword = e.target.value.toLowerCase();

  // 3. Lakukan perulangan untuk mengecek setiap kotak
  items.forEach(function(item) {
    // Ambil seluruh teks di dalam kotak tersebut
    const textItem = item.textContent.toLowerCase();

    // 4. Logika pencocokan
    if (textItem.includes(keyword)) {
      // Jika cocok, tampilkan kotaknya
      item.style.display = 'block'; 
    } else {
      // Jika tidak cocok, sembunyikan kotaknya
      item.style.display = 'none';  
    }
  });
});
</script>
