<!DOCTYPE html>
<html>
<head>
    <title>Window Control</title>
</head>
<body>

<button onclick="openWindow()">
    Open Window
</button>

<button onclick="closeWindow()">
    Close Window
</button>

<script>

    let popup;

    function openWindow(){

        popup = window.open(
            "popup.html",
            "Popup",
            "width=500,height=500"
        );

    }

    

</script>

</body>
</html>
